<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Drag Race 400km/h</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Arial', sans-serif; color: white; }
        
        /* Cenário 3D */
        #game-container {
            perspective: 800px;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: flex-end;
            overflow: hidden; background: linear-gradient(#44a, #000);
        }

        #track {
            position: absolute; width: 400px; height: 10000px;
            background: repeating-linear-gradient(#333 0, #333 100px, #444 100px, #444 200px);
            transform: rotateX(80deg) translateY(-4800px);
            transform-origin: bottom;
            border-left: 10px solid white; border-right: 10px solid white;
        }

        .line {
            position: absolute; left: 50%; width: 10px; height: 100%;
            border-left: 5px dashed yellow; transform: translateX(-50%);
        }

        /* Carro */
        #car {
            position: absolute; bottom: 50px; width: 80px; height: 120px;
            background: #d00; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 10; transition: transform 0.1s;
        }

        /* UI */
        #hud {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7);
            padding: 20px; border-radius: 10px; border: 2px solid #555;
        }

        .stat { font-size: 24px; margin-bottom: 5px; }
        .stat span { color: #0f0; font-weight: bold; }
        
        #controls-hint { position: absolute; bottom: 20px; right: 20px; text-align: right; opacity: 0.7; }
        #finish { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                   font-size: 50px; display: none; text-shadow: 0 0 20px gold; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="track"><div class="line"></div></div>
        <div id="car"></div>
    </div>

    <div id="hud">
        <div class="stat">Distância: <span id="dist">0</span>m / 1000m</div>
        <div class="stat">Velocidade: <span id="speed">0</span> km/h</div>
        <div class="stat">Marcha: <span id="gear">1</span></div>
        <div class="stat">Modo: <span id="mode">Manual</span> (M para trocar)</div>
    </div>

    <div id="finish">CHEGADA! <br> <span id="final-time"></span></div>

    <div id="controls-hint">
        <b>W:</b> Acelerar | <b>S:</b> Frear <br>
        <b>Seta Cima:</b> Subir Marcha | <b>Seta Baixo:</b> Reduzir <br>
        <b>M:</b> Alternar Manual/Auto
    </div>

    <script>
        const track = document.getElementById('track');
        const car = document.getElementById('car');
        const speedEl = document.getElementById('speed');
        const gearEl = document.getElementById('gear');
        const distEl = document.getElementById('dist');
        const modeEl = document.getElementById('mode');

        let speed = 0;
        let distance = 0;
        let gear = 1;
        let pos = -4800;
        let isManual = true;
        let keys = {};
        let startTime = null;
        let finished = false;

        const maxSpeedPerGear = [0, 80, 160, 240, 320, 380, 405];
        const acceleration = 0.5;

        document.addEventListener('keydown', (e) => { 
            keys[e.key] = true; 
            if(e.key === 'm' || e.key === 'M') {
                isManual = !isManual;
                modeEl.innerText = isManual ? "Manual" : "Automático";
            }
            if(isManual && e.key === 'ArrowUp' && gear < 6) gear++;
            if(isManual && e.key === 'ArrowDown' && gear > 1) gear--;
        });
        document.addEventListener('keyup', (e) => keys[e.key] = false);

        function update() {
            if(finished) return;

            // Lógica de aceleração
            if (keys['w'] || keys['W']) {
                if(!startTime) startTime = Date.now();
                if (speed < maxSpeedPerGear[gear]) {
                    speed += acceleration;
                }
            } else {
                speed *= 0.99; // Atrito
            }

            if (keys['s'] || keys['S']) speed -= 1.5;
            if (speed < 0) speed = 0;

            // Câmbio Automático
            if(!isManual) {
                if(speed > maxSpeedPerGear[gear] * 0.9 && gear < 6) gear++;
                if(speed < maxSpeedPerGear[gear-1] * 0.8 && gear > 1) gear--;
            }

            // Movimentação da pista e distância
            distance += (speed / 3.6) / 60; // km/h para m/s
            pos += speed / 10;
            track.style.transform = `rotateX(80deg) translateY(${pos - 4800}px)`;

            // Vibração do carro em alta velocidade
            let shake = (speed / 100) * Math.random();
            car.style.transform = `translateX(${shake}px)`;

            // Atualiza UI
            speedEl.innerText = Math.floor(speed);
            gearEl.innerText = gear;
            distEl.innerText = Math.floor(distance);

            // Condição de vitória
            if (distance >= 1000) {
                finished = true;
                let totalTime = ((Date.now() - startTime) / 1000).toFixed(2);
                document.getElementById('finish').style.display = "block";
                document.getElementById('final-time').innerText = `Tempo: ${totalTime}s`;
            }

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
