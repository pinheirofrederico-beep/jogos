<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>2 Player Racing - Nitro Edition</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #222;
            color: white;
            font-family: sans-serif;
            margin: 0;
            overflow: hidden;
        }
        canvas {
            border: 5px solid #444;
            background-color: #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .controls {
            display: flex;
            gap: 50px;
            margin-top: 10px;
        }
        .key {
            background: #444;
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
            color: #ffda44;
        }
    </style>
</head>
<body>

    <h2>2 Player Racing - Nitro!</h2>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div class="controls">
        <div>
            <p><strong>Player 1 (Vermelho):</strong></p>
            <p>Mover: <span class="key">WASD</span> | Nitro: <span class="key">Shift L</span></p>
        </div>
        <div>
            <p><strong>Player 2 (Azul):</strong></p>
            <p>Mover: <span class="key">Setas</span> | Nitro: <span class="key">Enter</span></p>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Configurações Globais
    const friction = 0.97; // Atrito para reduzir velocidade gradualmente
    
    // Objeto do Carro
    class Car {
        constructor(x, y, color, controls) {
            this.x = x;
            this.y = y;
            this.width = 30;
            this.height = 50;
            this.color = color;
            this.angle = 0;
            this.speed = 0;
            this.maxSpeed = 5;
            this.accel = 0.2;
            this.rotateSpeed = 0.05;
            this.nitro = 100;
            this.isNitroActive = false;
            this.controls = controls;
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            
            // Desenha o corpo do carro
            ctx.fillStyle = this.color;
            ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
            
            // Detalhe: Frente do carro (indicador de direção)
            ctx.fillStyle = "white";
            ctx.fillRect(-this.width/2, -this.height/2, this.width, 10);

            // Efeito visual do Nitro
            if (this.isNitroActive && this.nitro > 0) {
                ctx.fillStyle = "cyan";
                ctx.fillRect(-this.width/4, this.height/2, this.width/2, 15);
            }

            ctx.restore();

            // Barra de Nitro acima do carro
            ctx.fillStyle = "#555";
            ctx.fillRect(this.x - 20, this.y - 40, 40, 5);
            ctx.fillStyle = "cyan";
            ctx.fillRect(this.x - 20, this.y - 40, (this.nitro/100) * 40, 5);
        }

        update(keys) {
            // Controles de Movimento
            if (keys[this.controls.up]) {
                this.speed += this.accel;
            } else if (keys[this.controls.down]) {
                this.speed -= this.accel;
            }

            // Nitro
            if (keys[this.controls.nitro] && this.nitro > 0) {
                this.speed += this.accel * 2;
                this.nitro -= 1;
                this.isNitroActive = true;
            } else {
                this.isNitroActive = false;
                if (this.nitro < 100) this.nitro += 0.1; // Recarrega devagar
            }

            // Rotação (só gira se estiver em movimento)
            if (Math.abs(this.speed) > 0.1) {
                const direction = this.speed > 0 ? 1 : -1;
                if (keys[this.controls.left]) this.angle -= this.rotateSpeed * direction;
                if (keys[this.controls.right]) this.angle += this.rotateSpeed * direction;
            }

            // Física Básica
            this.speed *= friction;
            if (this.speed > this.maxSpeed && !this.isNitroActive) this.speed = this.maxSpeed;

            this.x += Math.sin(this.angle) * this.speed;
            this.y -= Math.cos(this.angle) * this.speed;

            // Colisão com as bordas (simples)
            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
        }
    }

    // Instanciando Jogadores
    const p1 = new Car(300, 500, "red", {
        up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD', nitro: 'ShiftLeft'
    });

    const p2 = new Car(500, 500, "dodgerblue", {
        up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', nitro: 'Enter'
    });

    // Gerenciador de Teclas
    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function gameLoop() {
        // Limpar tela
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Desenhar Pista (opcional - simples grama/estrada)
        ctx.strokeStyle = "#555";
        ctx.setLineDash([20, 20]);
        ctx.strokeRect(50, 50, canvas.width - 100, canvas.height - 100);

        // Atualizar e Desenhar Carros
        p1.update(keys);
        p2.update(keys);
        
        p1.draw();
        p2.draw();

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
