<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Drag Race 800m - 400km/h</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #ui {
            margin: 10px;
            text-align: center;
        }
        canvas {
            background: #333;
            border-bottom: 5px solid #555;
            border-top: 5px solid #555;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .stats {
            display: flex;
            gap: 40px;
            font-size: 1.2rem;
            margin-top: 10px;
        }
        .p1 { color: #ff4d4d; }
        .p2 { color: #4d94ff; }
        kbd {
            background: #444;
            padding: 2px 6px;
            border-radius: 4px;
            color: #fff;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Arrancada 800 Metros</h1>
        <p>Segure a tecla para acelerar! Meta: 216 km/h (60 m/s)</p>
        <div class="stats">
            <div class="p1">P1 (W): <span id="speed1">400</span> km/h | <span id="dist1">400</span>m</div>
            <div class="p2">P2 (Seta Cima): <span id="speed2">0</span> km/h | <span id="dist2">0</span>m</div>
        </div>
    </div>

    <canvas id="raceCanvas"></canvas>

    <script>
        const canvas = document.getElementById('raceCanvas');
        const ctx = canvas.getContext('2d');

        // Configurações de Mundo
        canvas.width = window.innerWidth * 0.9;
        canvas.height = 300;
        
        const LARGURA_PISTA_METROS = 800;
        const VEL_MAX_MS = 60; // 60 m/s = 216 km/h
        const ESCALA = canvas.width / LARGURA_PISTA_METROS; // pixels por metro

        class Carro {
            constructor(y, cor, tecla) {
                this.distancia = 0; // em metros
                this.velocidade = 0; // em m/s
                this.aceleracao = 0.4; // m/s²
                this.frenagem = 0.98; // atrito natural
                this.y = y;
                this.cor = cor;
                this.tecla = tecla;
                this.vitoria = false;
                this.tempo = 0;
            }

            atualizar(isPressed, finalizado) {
                if (this.distancia < LARGURA_PISTA_METROS && !finalizado) {
                    if (isPressed) {
                        this.velocidade += this.aceleracao;
                    } else {
                        this.velocidade *= this.frenagem;
                    }

                    // Limitador de 216 km/h
                    if (this.velocidade > VEL_MAX_MS) this.velocidade = VEL_MAX_MS;
                    
                    this.distancia += this.velocidade / 60; // Baseado em 60 FPS
                    this.tempo += 1/60;
                }
            }

            desenhar() {
                const xPos = this.distancia * ESCALA;
                
                // Desenhar Carro
                ctx.fillStyle = this.cor;
                ctx.fillRect(xPos, this.y, 40, 20);
                
                // Faróis
                ctx.fillStyle = "yellow";
                ctx.fillRect(xPos + 35, this.y + 2, 5, 5);
                ctx.fillRect(xPos + 35, this.y + 13, 5, 5);
            }
        }

        const p1 = new Carro(80, "#ff4d4d", "KeyW");
        const p2 = new Carro(200, "#4d94ff", "ArrowUp");

        const keys = {};
        let jogoAtivo = true;
        let vencedor = "";

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function renderPista() {
            // Linha de Chegada
            ctx.strokeStyle = "white";
            ctx.lineWidth = 5;
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width - 5, 0);
            ctx.lineTo(canvas.width - 5, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Marcações de metros
            ctx.fillStyle = "#666";
            for(let i = 0; i <= 800; i += 100) {
                ctx.fillText(i + "m", i * ESCALA, canvas.height - 10);
            }
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            renderPista();

            p1.atualizar(keys[p1.tecla], !jogoAtivo);
            p2.atualizar(keys[p2.tecla], !jogoAtivo);

            p1.desenhar();
            p2.desenhar();

            // UI Update
            document.getElementById('speed1').innerText = Math.floor(p1.velocidade * 3.6);
            document.getElementById('dist1').innerText = Math.floor(p1.distancia);
            document.getElementById('speed2').innerText = Math.floor(p2.velocidade * 3.6);
            document.getElementById('dist2').innerText = Math.floor(p2.distancia);

            // Verificação de Vitória
            if (jogoAtivo) {
                if (p1.distancia >= LARGURA_PISTA_METROS) {
                    vencedor = "Jogador 1 (Vermelho)";
                    jogoAtivo = false;
                } else if (p2.distancia >= LARGURA_PISTA_METROS) {
                    vencedor = "Jogador 2 (Azul)";
                    jogoAtivo = false;
                }
            } else {
                ctx.fillStyle = "white";
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText(vencedor + " VENCEU!", canvas.width/2, canvas.height/2);
                ctx.font = "20px Arial";
                ctx.fillText("F5 para reiniciar", canvas.width/2, canvas.height/2 + 40);
            }

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
