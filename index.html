<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitro Drag 1000km - Extreme Edition</title>
    <style>
        :root { --speed-blur: 0px; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; color: #fff; }
        
        /* Ambiente 3D */
        #world {
            perspective: 600px;
            width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, #020107 0%, #201b46 50%, #483137 100%);
            display: flex; justify-content: center; overflow: hidden;
        }

        #road-container {
            position: absolute; bottom: 0; width: 100%; height: 80%;
            transform-style: preserve-3d; transform: rotateX(70deg);
        }

        /* A Pista com Detalhes */
        #track {
            position: absolute; width: 1200px; height: 40000px;
            left: calc(50% - 600px); bottom: 0;
            background: 
                /* Faixa central */
                linear-gradient(90deg, transparent 48%, #fff 48%, #fff 52%, transparent 52%),
                /* Faixas laterais */
                linear-gradient(90deg, #555 0%, #555 2%, transparent 2%, transparent 98%, #555 98%, #555 100%),
                /* Textura Asfalto */
                repeating-linear-gradient(#222 0, #222 50px, #282828 50px, #282828 100px);
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* Grama/Terra lateral */
        .scenery {
            position: absolute; width: 3000px; height: 40000px;
            left: calc(50% - 1500px); bottom: 0; z-index: -1;
            background: repeating-linear-gradient(#0a240a 0, #0a240a 500px, #061a06 500px, #061a06 1000px);
        }

        /* Postes de Luz para sensação de movimento */
        .pole {
            position: absolute; width: 10px; height: 100px;
            background: #111; border-top: 40px solid #ffcc00;
        }

        /* O Carro */
        #car {
            position: absolute; bottom: 100px; width: 120px; height: 210px;
            background-image: url('https://i.imgur.com/uF9T2U6.png'); /* Imagem esportiva top view */
            background-size: contain; background-repeat: no-repeat;
            z-index: 100; filter: drop-shadow(0 25px 15px rgba(0,0,0,0.9)) blur(var(--speed-blur));
            transition: transform 0.05s;
        }

        /* HUD Moderno */
        #ui-panel {
            position: absolute; bottom: 30px; left: 30px; 
            background: rgba(0,0,0,0.8); padding: 20px; border-left: 5px solid #00f2ff;
            border-radius: 0 15px 15px 0; min-width: 250px;
        }

        .gauge-label { font-size: 12px; color: #00f2ff; text-transform: uppercase; }
        .gauge-val { font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        
        #speedometer { color: #fff; text-shadow: 0 0 10px #00f2ff; }
        #finish-line { 
            position: absolute; top: 30%; width: 100%; text-align: center; 
            font-size: 80px; display: none; color: gold; font-weight: bold; text-shadow: 0 0 30px #000;
        }

        .manual-flash { animation: flash 0.5s infinite; color: red !important; }
        @keyframes flash { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="world">
        <div id="road-container">
            <div class="scenery"></div>
            <div id="track"></div>
        </div>
        <div id="car"></div>
    </div>

    <div id="ui-panel">
        <div class="gauge-label">Velocidade</div>
        <div class="gauge-val"><span id="speed">0</span> <small>KM/H</small></div>
        
        <div class="gauge-label">Distância</div>
        <div class="gauge-val"><span id="dist">0.0</span> <small>KM / 1000</small></div>

        <div class="gauge-label">Marcha</div>
        <div class="gauge-val" id="gear-box"><span id="gear">1</span></div>

        <div style="font-size: 10px; opacity: 0.7;">W: ACELERA | SETAS: MARCHAS | M: AUTO</div>
    </div>

    <div id="finish-line">VENCEU! 1000KM</div>

    <script>
        const track = document.getElementById('track');
        const car = document.getElementById('car');
        const speedEl = document.getElementById('speed');
        const gearEl = document.getElementById('gear');
        const distEl = document.getElementById('dist');
        const gearBox = document.getElementById('gear-box');

        let speed = 0;
        let distanceKm = 0;
        let gear = 1;
        let trackPos = -38000;
        let isAuto = false;
        let keys = {};

        const gearMax = [0, 90, 160, 240, 310, 375, 405];

        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if(e.key.toLowerCase() === 'm') isAuto = !isAuto;
            if(!isAuto) {
                if(e.key === 'ArrowUp' && gear < 6) gear++;
                if(e.key === 'ArrowDown' && gear > 1) gear--;
            }
        });
        window.addEventListener('keyup', e => keys[e.key] = false);

        function update() {
            // Aceleração e Física
            if (keys['w'] || keys['W']) {
                if (speed < gearMax[gear]) speed += 0.8;
                // Efeito de "corte de giro"
                if (speed >= gearMax[gear] && !isAuto) {
                    speed -= 2;
                    gearBox.classList.add('manual-flash');
                } else {
                    gearBox.classList.remove('manual-flash');
                }
            } else {
                speed *= 0.99;
                gearBox.classList.remove('manual-flash');
            }

            if (keys['s'] || keys['S']) speed -= 3;
            if (speed < 0) speed = 0;

            // Câmbio Automático inteligente
            if(isAuto) {
                if(speed > gearMax[gear] * 0.9 && gear < 6) gear++;
                if(speed < gearMax[gear-1] * 0.8 && gear > 1) gear--;
            }

            // Progresso Real
            distanceKm += (speed / 3600) / 60;
            
            // Movimento da pista (Efeito infinito e 3D)
            trackPos += speed / 6;
            if(trackPos > 0) trackPos = -2000; 
            track.parentElement.style.transform = `rotateX(70deg) translateY(${trackPos}px)`;

            // Efeitos Visuais de Velocidade
            let shake = (speed / 100) * (Math.random() - 0.5);
            let blur = speed > 300 ? (speed - 300) / 20 : 0;
            document.documentElement.style.setProperty('--speed-blur', `${blur}px`);
            car.style.transform = `translateX(${shake}px)`;

            // UI
            speedEl.innerText = Math.floor(speed);
            gearEl.innerText = isAuto ? 'A' + gear : gear;
            distEl.innerText = distanceKm.toFixed(1);

            if (distanceKm >= 1000) {
                document.getElementById('finish-line').style.display = "block";
            }

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
