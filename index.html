<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Infinito - 10.000 Níveis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <header>
            <div class="stats">
                <span>Nível: <strong id="level-display">1</strong></span>
                <span>Progresso: <strong id="progress-display">1/40</strong></span>
            </div>
            <div class="progress-bar"><div id="bar-fill"></div></div>
        </header>

        <div id="game-box">
            <h2 id="question-text">Carregando pergunta...</h2>
            <div id="options-container" class="options">
                </div>
        </div>

        <div id="feedback" class="hidden"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
